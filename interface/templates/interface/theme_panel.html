{% load static %}
<!-- ── THEME PANEL ───────────────────────────────────────────────── -->
<div id="themePanel" class="theme-panel">
    <div class="theme-panel-header">
        <span class="theme-panel-title">// THEMES</span>
        <button class="theme-panel-close" onclick="closeThemePanel()">✕</button>
    </div>
    <div class="theme-panel-body" id="themePanelBody">
        <!-- populated by JS -->
    </div>
</div>
<div id="themePanelOverlay" class="theme-panel-overlay" onclick="closeThemePanel()"></div>

<style>
    .theme-panel-overlay {
        display: none;
        position: fixed;
        inset: 0;
        z-index: 299;
    }
    .theme-panel-overlay.active { display: block; }

    .theme-panel {
        position: fixed;
        top: 52px;
        right: -300px;
        width: 276px;
        height: calc(100vh - 52px);
        background: var(--t-surface);
        border-left: 1px solid var(--t-border-hi);
        z-index: 300;
        display: flex;
        flex-direction: column;
        transition: right 0.25s ease;
        box-shadow: -4px 0 24px rgba(0,0,0,0.25);
    }

    .theme-panel.active { right: 0; }

    .theme-panel-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 1rem 1.2rem 0.8rem;
        border-bottom: 1px solid var(--t-border);
        flex-shrink: 0;
    }

    .theme-panel-title {
        font-family: 'Courier New', monospace;
        font-size: 0.65rem;
        letter-spacing: 0.18rem;
        color: var(--t-accent);
    }

    .theme-panel-close {
        background: transparent;
        border: 1px solid var(--t-border-hi);
        color: var(--t-text-dim);
        width: 24px; height: 24px;
        border-radius: 4px;
        cursor: pointer;
        font-size: 0.7rem;
        display: flex; align-items: center; justify-content: center;
        transition: all 0.15s;
    }
    .theme-panel-close:hover { border-color: var(--t-red); color: var(--t-red); }

    .theme-panel-body {
        flex: 1;
        overflow-y: auto;
        padding: 0.8rem;
        display: flex;
        flex-direction: column;
        gap: 0.4rem;
        scrollbar-width: thin;
        scrollbar-color: var(--t-border-hi) transparent;
    }

    /* section label */
    .theme-section-label {
        font-family: 'Courier New', monospace;
        font-size: 0.55rem;
        letter-spacing: 0.2rem;
        color: var(--t-text-mute);
        padding: 0.6rem 0.2rem 0.2rem;
        text-transform: uppercase;
    }
    .theme-section-label:first-child { padding-top: 0.2rem; }

    .theme-card {
        border: 2px solid var(--t-border);
        border-radius: 8px;
        padding: 0.75rem 0.9rem;
        cursor: pointer;
        transition: all 0.15s;
        background: var(--t-surface2);
    }

    .theme-card:hover        { border-color: var(--t-accent); transform: translateX(-2px); }
    .theme-card.active-theme {
        border-color: var(--t-accent);
        background: color-mix(in srgb, var(--t-accent) 8%, var(--t-surface2));
    }

    .theme-card-top {
        display: flex;
        align-items: center;
        gap: 0.6rem;
        margin-bottom: 0.35rem;
    }

    .theme-swatches {
        display: flex;
        gap: 3px;
        flex-shrink: 0;
    }

    .theme-swatch {
        width: 13px;
        height: 13px;
        border-radius: 50%;
        border: 1px solid rgba(128,128,128,0.2);
        flex-shrink: 0;
    }

    .theme-card-name {
        font-family: 'Courier New', monospace;
        font-size: 0.68rem;
        letter-spacing: 0.06rem;
        color: var(--t-text);
        font-weight: 600;
        flex: 1;
    }

    .theme-active-dot {
        width: 6px; height: 6px;
        border-radius: 50%;
        background: var(--t-accent);
        flex-shrink: 0;
        display: none;
        box-shadow: 0 0 6px var(--t-accent);
    }
    .theme-card.active-theme .theme-active-dot { display: block; }

    .theme-card-desc {
        font-size: 0.7rem;
        color: var(--t-text-dim);
        line-height: 1.4;
    }
</style>

<script>
function openThemePanel() {
    document.getElementById('themePanel').classList.add('active');
    document.getElementById('themePanelOverlay').classList.add('active');
}

function closeThemePanel() {
    document.getElementById('themePanel').classList.remove('active');
    document.getElementById('themePanelOverlay').classList.remove('active');
}

function buildThemePanel() {
    const body    = document.getElementById('themePanelBody');
    const current = net1GetTheme();
    body.innerHTML = '';

    const dark  = Object.entries(NET1_THEMES).filter(([, t]) => t.dark !== false);
    const light = Object.entries(NET1_THEMES).filter(([, t]) => t.dark === false);

    function renderSection(label, entries) {
        const section = document.createElement('div');
        section.className = 'theme-section-label';
        section.textContent = label;
        body.appendChild(section);

        entries.forEach(([key, theme]) => {
            const card = document.createElement('div');
            card.className = 'theme-card' + (key === current ? ' active-theme' : '');

            const swatchesHtml = theme.preview
                .map(c => `<div class="theme-swatch" style="background:${c}"></div>`)
                .join('');

            card.innerHTML = `
                <div class="theme-card-top">
                    <div class="theme-swatches">${swatchesHtml}</div>
                    <div class="theme-card-name">${theme.label}</div>
                    <div class="theme-active-dot"></div>
                </div>
                <div class="theme-card-desc">${theme.desc}</div>
            `;

            card.addEventListener('click', () => {
                net1ApplyTheme(key);
                document.querySelectorAll('.theme-card').forEach(c => c.classList.remove('active-theme'));
                card.classList.add('active-theme');
            });

            body.appendChild(card);
        });
    }

    renderSection('— DARK —', dark);
    renderSection('— LIGHT —', light);
}

document.addEventListener('DOMContentLoaded', buildThemePanel);
</script>
